base_configs = ["./base.toml"]

[training]
# Stage selector consumed by config normalization.
stage = "stage2"
# Enable joint diffusion + VAE finetuning during stage2.
unfreeze_vae_in_stage2 = true

[optimization]
# Per-rank diffusion batch size.
batch_size = 256
# Number of optimizer updates for joint stage2.
max_steps = 20000
# Linear LR decay horizon for joint stage2. Usually match max_steps.
lr_anneal_steps = 20000
# EMA decay rates to save for inference.
ema_rates = [0.9999]
# Timestep sampler used by the diffusion objective.
schedule_sampler = "uniform"
# How often to print joint training metrics.
log_every_steps = 100
# How often to save joint stage2 checkpoints.
save_every_steps = 5000

[vae]
# Keep the VAE trainable in the joint stage2 template.
freeze = false
# Weight of the extra reconstruction loss while VAE is unfrozen.
reconstruction_loss_weight = 1.0

[evaluation]
# How often to run sampling-based diffusion validation.
every_steps = 5000
# Sampling method used during validation.
sampling_method = "ddim"
# CFG scale used during validation sampling.
cfg_scale = 1.0
