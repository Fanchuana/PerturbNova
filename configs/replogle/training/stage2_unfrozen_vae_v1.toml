base_configs = ["./stage2_unfrozen_vae.toml"]

[objective]
# Keep control samples as supervision anchors but do not feed them to the denoiser.
control_usage = "loss_only"

[objective.loss_weights]
# Preserve the original diffusion objective.
diffusion_mse = 1.0
# Small auxiliary reconstruction on predicted x_start.
xstart_mse = 0.05
# Batch-level perturbation effect alignment in latent space.
effect_batch_mse = 0.10
# Control-anchored cosine alignment for perturbation effects.
effect_cosine = 0.02

[dataset.control]
# v1 needs control samples for the loss anchor, even though the denoiser itself does not consume them.
enabled = true
